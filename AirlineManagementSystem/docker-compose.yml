version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: airline-sqlserver
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - airline-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: airline-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - airline-network

  # API Gateway (Ocelot)
  api-gateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: airline-api-gateway
    ports:
      - "5000:80"
    depends_on:
      - identity-service
      - flight-service
      - booking-service
      - payment-service
      - checkin-service
      - baggage-service
      - reward-service
      - agent-service
      - notification-service
      - admin-service
    networks:
      - airline-network

  # Identity Service
  identity-service:
    build:
      context: ./Services/IdentityService
      dockerfile: Dockerfile
    container_name: airline-identity-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=IdentityDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      JwtSettings__ExpirationMinutes: "60"
    depends_on:
      - sqlserver
    networks:
      - airline-network

  # Flight Service
  flight-service:
    build:
      context: ./Services/FlightService
      dockerfile: Dockerfile
    container_name: airline-flight-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=FlightDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      RabbitMqSettings__HostName: "rabbitmq"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - airline-network

  # Booking Service
  booking-service:
    build:
      context: ./Services/BookingService
      dockerfile: Dockerfile
    container_name: airline-booking-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=BookingDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      RabbitMqSettings__HostName: "rabbitmq"
      ServiceUrls__FlightService: "http://flight-service:5002"
      ServiceUrls__PaymentService: "http://payment-service:5004"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - airline-network

  # Payment Service
  payment-service:
    build:
      context: ./Services/PaymentService
      dockerfile: Dockerfile
    container_name: airline-payment-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=PaymentDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      RabbitMqSettings__HostName: "rabbitmq"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - airline-network

  # CheckIn Service
  checkin-service:
    build:
      context: ./Services/CheckInService
      dockerfile: Dockerfile
    container_name: airline-checkin-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CheckInDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      RabbitMqSettings__HostName: "rabbitmq"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - airline-network

  # Baggage Service
  baggage-service:
    build:
      context: ./Services/BaggageService
      dockerfile: Dockerfile
    container_name: airline-baggage-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=BaggageDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      RabbitMqSettings__HostName: "rabbitmq"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - airline-network

  # Reward Service
  reward-service:
    build:
      context: ./Services/RewardService
      dockerfile: Dockerfile
    container_name: airline-reward-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=RewardDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      RabbitMqSettings__HostName: "rabbitmq"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - airline-network

  # Agent Service
  agent-service:
    build:
      context: ./Services/AgentService
      dockerfile: Dockerfile
    container_name: airline-agent-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AgentDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      RabbitMqSettings__HostName: "rabbitmq"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - airline-network

  # Notification Service
  notification-service:
    build:
      context: ./Services/NotificationService
      dockerfile: Dockerfile
    container_name: airline-notification-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=NotificationDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;"
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
      RabbitMqSettings__HostName: "rabbitmq"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - airline-network

  # Admin Service
  admin-service:
    build:
      context: ./Services/AdminService
      dockerfile: Dockerfile
    container_name: airline-admin-service
    environment:
      JwtSettings__Key: "your-super-secret-key-that-is-at-least-32-characters-long"
      JwtSettings__Issuer: "AirlineIdentityService"
      JwtSettings__Audience: "AirlineManagementSystem"
    depends_on:
      - flight-service
      - booking-service
      - payment-service
      - agent-service
    networks:
      - airline-network

volumes:
  sqlserver_data:
  rabbitmq_data:

networks:
  airline-network:
    driver: bridge
